<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>どうぶつの森風ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:sans-serif;
}

#game{
position:relative;
width:800px;
height:500px;
margin:20px auto;
background:#7ec850;
border:5px solid black;
overflow:hidden;
}

#player{
position:absolute;
width:40px;
height:40px;
background:red;
left:100px;
top:200px;
border-radius:10px;
}

.npc{
position:absolute;
width:40px;
height:40px;
background:orange;
border-radius:10px;
}

#dialog{
position:absolute;
bottom:0;
left:0;
width:100%;
height:120px;
background:rgba(0,0,0,0.8);
color:white;
font-size:22px;
padding:20px;
display:none;
}

</style>
</head>

<body>

<div id="game">

<div id="player"></div>

<div class="npc" data-text="こんにちは！いい天気だね！" style="left:400px;top:150px"></div>
<div class="npc" data-text="魚をつりたいな〜" style="left:650px;top:300px"></div>
<div class="npc" data-text="キミは新しい住民？" style="left:1000px;top:200px"></div>

<div id="dialog"></div>

</div>

<script>

const player=document.getElementById("player");
const dialog=document.getElementById("dialog");

let x=100;
let y=200;

let camera=0;

let up=false,down=false,left=false,right=false;

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp") up=true;
if(e.key==="ArrowDown") down=true;
if(e.key==="ArrowLeft") left=true;
if(e.key==="ArrowRight") right=true;

if(e.key===" "){
talk();
}
});

document.addEventListener("keyup",e=>{
if(e.key==="ArrowUp") up=false;
if(e.key==="ArrowDown") down=false;
if(e.key==="ArrowLeft") left=false;
if(e.key==="ArrowRight") right=false;
});

function hit(a,b){
return !(a.right<b.left||a.left>b.right||a.bottom<b.top||a.top>b.bottom);
}

function talk(){

let pRect=player.getBoundingClientRect();

document.querySelectorAll(".npc").forEach(n=>{

let rect=n.getBoundingClientRect();

if(hit(pRect,rect)){
dialog.style.display="block";
dialog.innerText=n.dataset.text;
}

});

}

function loop(){

if(up) y-=3;
if(down) y+=3;
if(right) x+=3;
if(left) x-=3;

camera=x-300;
if(camera<0) camera=0;

player.style.left=(x-camera)+"px";
player.style.top=y+"px";

document.querySelectorAll(".npc").forEach(n=>{
n.style.transform=`translateX(${-camera}px)`;
});

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
