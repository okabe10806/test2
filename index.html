<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超ガチャ</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
}

.container{
    padding:30px;
}

button{
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:12px;
    background:gold;
    cursor:pointer;
    margin-bottom:20px;
}

#loading{
    font-size:30px;
    height:40px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.card{
    width:110px;
    height:160px;
    background:#333;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    transform:scale(0);
    animation:appear 0.4s forwards;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.ur{
    box-shadow:0 0 20px 5px violet;
}

.ssr{
    box-shadow:0 0 15px 4px gold;
}

@keyframes appear{
    to{ transform:scale(1);}
}

.rainbow{
    background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
    background-size:400%;
    animation:rainbowMove 3s infinite;
}

@keyframes rainbowMove{
    0%{background-position:0%}
    100%{background-position:400%}
}

</style>
</head>

<body>

<div class="container">

<h1>✨神ガチャ✨</h1>

<button onclick="startGacha()">10連ガチャ！</button>

<div id="loading"></div>

<div id="cards" class="cards"></div>

</div>

<script>

const chars = [
{
name:"ノーマル勇者",
rate:60,
img:"https://picsum.photos/200/300?random=1",
class:""
},
{
name:"レア魔法使い",
rate:30,
img:"https://picsum.photos/200/300?random=2",
class:""
},
{
name:"SSRドラゴン",
rate:9,
img:"https://picsum.photos/200/300?random=3",
class:"ssr"
},
{
name:"UR神",
rate:1,
img:"https://picsum.photos/200/300?random=4",
class:"ur rainbow"
}
];

function roll(){

let r=Math.random()*100;
let sum=0;

for(let c of chars){
sum+=c.rate;
if(r<sum) return c;
}

}

async function startGacha(){

document.getElementById("cards").innerHTML="";
document.getElementById("loading").innerText="ガチャ中…";

await new Promise(r=>setTimeout(r,1500));

document.getElementById("loading").innerText="";

for(let i=0;i<10;i++){

await new Promise(r=>setTimeout(r,300));

let c=roll();

let div=document.createElement("div");
div.className="card "+c.class;

let img=document.createElement("img");
img.src=c.img;

div.appendChild(img);

document.getElementById("cards").appendChild(div);

}

}

</script>

</body>
</html>
